services:
  - type: web
    name: aegis-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn Aegis.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AEGIS_REPO_ROOT
        value: /opt/render/project/src
      - key: AEGIS_SCAN_TARGET
        value: demo/patient-portal
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,https://*.vercel.app
      - key: PYTHONIOENCODING
        value: utf-8
      - key: PYTHONUNBUFFERED
        value: "1"
